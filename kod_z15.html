mój numer z dziennika to 6 <br>
data urodzenia: 20.01, numer buta=43 <br>
numer miesiąca urodzenia=1 <br>
numer dnia urodzenia=20 <br>

==================================== <br>
definiowanie koloru znacznika p <br>
Zmiana kolor liter --> sposobem pierwszym z tabeli/instrukcja <br>

100+numer miesiąca urodzenia = 100+1=(101)10=(65)H <br>
150+numer dnia urodzenia = 150+20=(170)10=(AA)H <br>
50+numer buta = 50+43=(93)10=(5D)H <br>

czyli kolor w HEXA #65AA5D dla znacznika p <br>

wypisz: znacznik p ---> {color:#65AA5D;}, wielkość liter 10+N=16mm <br>

==================================== <br>
definiowanie koloru znacznika body <br>
Zmiana kolor liter --> sposobem czwartym z tabeli/instrukcja <br>

R = 125 + numer dnia urodzenia = 125+20=145 → 145/255*100% ≈ 57% <br>
G = 50 + numer buta = 50+43=93 → 93/255*100% ≈ 36% <br>
B = 200 + numer miesiąca urodzenia = 200+1=201 → 201/255*100% ≈ 79% <br>

czyli kolor w RGB (57%,36%,79%) dla znacznika body <br>

znacznik body ---> {color: rgb(57%,36%,79%);}, wielkość liter 10+J=16mm <br>
